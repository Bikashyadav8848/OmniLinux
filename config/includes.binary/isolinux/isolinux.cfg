# OmniLinux isolinux boot menu configuration
# Used by syslinux/isolinux for BIOS boot

UI menu.c32
INCLUDE stdmenu.cfg

DEFAULT live
TIMEOUT 100
PROMPT 0

LABEL live
    MENU LABEL ^Start OmniLinux (Live)
    MENU DEFAULT
    KERNEL /live/vmlinuz
    APPEND initrd=/live/initrd.img boot=live components config quiet splash

LABEL safe
    MENU LABEL ^Safe Graphics Mode (nomodeset)
    KERNEL /live/vmlinuz
    APPEND initrd=/live/initrd.img boot=live components config nomodeset quiet splash

LABEL failsafe
    MENU LABEL ^Failsafe Mode
    KERNEL /live/vmlinuz
    APPEND initrd=/live/initrd.img boot=live components config noapic noapm nodma nomce nolapic nosmp vga=normal

LABEL install
    MENU LABEL ^Install OmniLinux to Disk
    KERNEL /live/vmlinuz
    APPEND initrd=/live/initrd.img boot=live components config quiet splash

LABEL memtest
    MENU LABEL ^Memory Test (memtest86+)
    KERNEL /live/memtest86+x64.bin

MENU SEPARATOR

LABEL reboot
    MENU LABEL ^Reboot
    COM32 /isolinux/reboot.c32

LABEL poweroff
    MENU LABEL ^Power Off
    COM32 /isolinux/poweroff.c32