# GRUB menu configuration for OmniLinux Live Boot
set default="0"
set timeout="10"

# Load theme
if [ -f "${prefix}/themes/omnilinux/theme.txt" ]; then
    set theme="${prefix}/themes/omnilinux/theme.txt"
fi

# Load background if theme not available
if [ -f "/boot/grub/background.png" ]; then
    set background_color="0x0D1117"
fi

# Terminal output
terminal_output console

menuentry "Start OmniLinux" {
    linux /live/vmlinuz boot=live components config quiet splash
    initrd /live/initrd.img
}

menuentry "Start OmniLinux (Safe Graphics)" {
    linux /live/vmlinuz boot=live components config nomodeset quiet splash
    initrd /live/initrd.img
}

menuentry "Start OmniLinux (Failsafe)" {
    linux /live/vmlinuz boot=live components config noapic noapm nodma nomce nolapic nosmp vga=normal
    initrd /live/initrd.img
}

menuentry "Install OmniLinux" {
    linux /live/vmlinuz boot=live components config only-ubiquity
    initrd /live/initrd.img
}

menuentry "Memory Test (memtest86+)" {
    linux16 /boot/memtest86+.bin
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}