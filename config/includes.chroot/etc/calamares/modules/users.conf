---
# Calamares users module configuration

# Default groups for new users
defaultGroups:
    - audio
    - video
    - games
    - users
    - input
    - netdev
    - plugdev
    - bluetooth
    - scanner
    - cdrom
    - dialout
    - lpadmin
    - sambashare

# Sudo access group (standard on Debian/Ubuntu)
sudoersGroup: sudo

# Automatically log in the user after installation
doAutologin: false

# Shell for the new user
userShell: /bin/bash

# Require a non-empty password
passwordRequirements:
    nonempty: true
    minLength: 6

# Hostname settings
setRootPassword: false
allowWeakPasswords: false

# Default hostname shown in installer
presetHostname: omnilinux