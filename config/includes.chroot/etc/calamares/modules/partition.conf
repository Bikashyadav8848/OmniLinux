---
# Calamares partition module configuration
# Reference: https://github.com/calamares/calamares/blob/calamares/src/modules/partition/Config.h

# Minimum required storage (20 GB — realistic for 3 DEs + dev tools)
requiredStorage: 20.0

# LUKS encryption settings
luksGeneration: luks1
allowManualPartitioning: true
alwaysShowPartitionLabels: true
initialPartitioningChoice: none
initialSwapChoice: small

# Available filesystem choices
availableFilesystems:
    - ext4
    - btrfs
    - xfs

# Default filesystem
defaultFileSystemType: ext4

# Enable swap partition suggestion
ensureSuspendToDisk: true
neverCreateSwap: false

# EFI system partition minimum size (512 MiB)
efiSystemPartition: /boot/efi
efiSystemPartitionSize: 512M
efiSystemPartitionName: EFI System Partition