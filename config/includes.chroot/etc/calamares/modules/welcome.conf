---
# Calamares welcome module configuration

# Minimum disk space required (20 GiB in bytes)
# 20 * 1024^3 = 21474836480
minimumRootDiskSize: 21474836480

# Minimum RAM required (1.5 GiB in bytes)
minimumRam: 1610612736

# Show release notes button
showSupportUrl: true
showDonateUrl: false

# URLs
supportUrl: "https://omnilinux.org/support"

# Live user (for password-less sudo in live session)
liveUser: "omnilinux"

# Check internet connectivity
requiresInternet: false