---
# Calamares bootloader module configuration
# Reference: https://github.com/calamares/calamares/blob/calamares/src/modules/bootloader/

# Bootloader type: only "grub" is supported on Calamares for Ubuntu
efiBootLoader: "grub"

# Whether to install GRUB for EFI systems
installEFI: true

# Whether to install GRUB for BIOS systems
installBIOS: true

# Extra kernel command line args appended to GRUB entries
kernelCmdLine: "quiet splash mitigations=off"

# GRUB timeout (seconds)
grubTimeout: 5

# GRUB theme path (installed into the chroot at build time)
grubInstallArguments:
    - "--target=x86_64-efi"
    - "--efi-directory=/boot/efi"
    - "--bootloader-id=OmniLinux"

# Write 10_linux entries with initrd
writeBootEntry: true