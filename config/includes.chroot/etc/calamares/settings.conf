---
# OmniLinux Calamares Global Configuration
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - users
      - summary
  - exec:
      - partition
      - bootloader
      - packages
      - users
  - show:
      - finished

# Branding
branding: omnilinux

# Storage configuration
locale:
  localeName: en_US.UTF-8

# Package installation
packagechooser:
  available:
    - kde
    - gnome
    - xfce
  selected:
    default: gnome

# Unpack packages after installation
unpackfs:
  enabled: true

# Bootloader configuration
bootloader:
  type: grub
  device: /dev/sda
  theme: omnilinux

# Welcome screen
welcome:
  showDetails: true
  showTimer: true
  allowLanguageSelector: true
  allowYearDelta: true
  mandatoryLanguage: false

# Users configuration
users:
  defaultGroups:
    - audio
    - video
    - wheel
    - sudo
    - users
  hostName: omnilinux
  loginShell: /bin/bash

# Partition configuration
partition:
  animation: true
  drawColors:
    freeSpace: "#3D7EFF"
    usedSpace: "#0D1117"
    preparation: "#7C3AED"