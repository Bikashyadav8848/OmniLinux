name: Build ISO
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y live-build debootstrap squashfs-tools xorriso
      - run: sudo rm -rf auto chroot live-image-*.iso config
      - run: sudo mkdir -p config/package-lists
      - run: echo "# OmniLinux" | sudo tee config/package-lists/empty.list.chroot
      - run: |
          sudo lb config \
            --mode ubuntu \
            --distribution jammy \
            --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
            --mirror-binary http://archive.ubuntu.com/ubuntu/ \
            --binary-images iso-hybrid \
            --system live \
            --source false \
            --apt-options "--no-install-recommends"
      - run: sudo lb bootstrap
      - run: sudo lb chroot || true
      - run: sudo rm -f /usr/sbin/start-stop-daemon.distrib
      - run: sudo lb build
      - uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: live-image-*.iso