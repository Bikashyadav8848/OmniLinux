name: OmniLinux ISO Build
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: echo "test" > test.txt
      - uses: actions/upload-artifact@v4
        with:
          name: test
          path: test.txt