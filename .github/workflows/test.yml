name: OmniLinux Simple Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create test file
        run: |
          mkdir -p output
          echo "OmniLinux test build" > output/test.txt
          ls -la output/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-test
          path: output/