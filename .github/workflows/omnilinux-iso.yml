name: omnilinux-iso
on: push
permissions:
  contents: read
  actions: read
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build squashfs-tools xorriso
      - name: Build
        run: |
          mkdir -p auto
          echo lb build noauto > auto/build
          sudo lb build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: "*.iso"