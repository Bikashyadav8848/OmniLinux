name: OmniLinux ISO Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [omnilinux-build]

jobs:
  iso:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4

      - name: Download Ubuntu Base ISO
        run: |
          wget -O ubuntu-base.iso https://releases.ubuntu.com/22.04/ubuntu-22.04.3-desktop-amd64.iso
          ls -lh ubuntu-base.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-24.04-desktop-amd64
          path: ubuntu-*.iso
          if-no-files-found: error