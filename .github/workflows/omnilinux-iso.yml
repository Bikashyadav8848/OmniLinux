name: OmniLinux ISO Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git live-build

      - name: Setup Config
        run: |
          sudo mkdir -p auto config
          cat > auto/config <<'CONF'
#!/bin/bash
lb config noauto \
    --mode ubuntu \
    --distribution jammy \
    --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
    --mirror-binary http://archive.ubuntu.com/ubuntu/ \
    --binary-images iso-hybrid \
    --system live \
    --source false
CONF
          sudo chmod +x auto/config

      - name: Build
        run: |
          sudo lb bootstrap
          sudo lb chroot
          sudo lb binary
        timeout-minutes: 30

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: '*.iso'
          if-no-files-found: ignore