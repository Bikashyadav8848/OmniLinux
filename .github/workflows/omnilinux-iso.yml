name: OmniLinux ISO Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [omnilinux-build]

jobs:
  iso:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends live-build debootstrap squashfs-tools xorriso mtools git wget gzip

      - name: Cleanup
        run: |
          sudo rm -rf auto chroot .stage live-image-*.iso

      - name: Setup Config
        run: |
          sudo mkdir -p auto
          cat > auto/config <<'EOF'
#!/bin/bash
lb config noauto \
    --architectures amd64 \
    --mode debian \
    --distribution noble \
    --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
    --mirror-binary http://archive.ubuntu.com/ubuntu/ \
    --iso-application OmniLinux \
    --iso-publisher OmniLinux \
    --iso-volume OmniLinux \
    --bootappend-live "boot=live config" \
    --linux-packages linux-image-generic \
    --initramfs initramfs-tools \
    --system live \
    --source false \
    --binary-images iso-hybrid
EOF
          chmod +x auto/config

      - name: Bootstrap
        run: |
          sudo lb bootstrap
        timeout-minutes: 20

      - name: Chroot
        run: |
          sudo lb chroot --verbose
        timeout-minutes: 20

      - name: Build ISO
        run: |
          sudo lb build --verbose

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-amd64
          path: live-image-*.iso
          if-no-files-found: error