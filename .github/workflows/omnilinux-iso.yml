name: OmniLinux ISO Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  iso:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug info
        run: |
          echo "Starting build..."
          pwd
          ls -la
      
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y live-build