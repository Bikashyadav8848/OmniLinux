name: OmniLinux ISO Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [omnilinux-build]

jobs:
  iso:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends live-build

      - name: Cleanup
        run: |
          sudo rm -rf auto chroot .stage live-image-*.iso

      - name: Setup Config
        run: |
          sudo mkdir -p auto
          echo '#!/bin/bash' | sudo tee auto/config
          echo 'lb config noauto --mode debian --distribution jammy --binary-images iso --system live --source false' | sudo tee -a auto/config
          sudo chmod +x auto/config

      - name: Bootstrap
        run: sudo lb bootstrap
        timeout-minutes: 10

      - name: Build
        run: sudo lb build
        timeout-minutes: 10

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-minimal
          path: live-image-*.iso
          if-no-files-found: ignore