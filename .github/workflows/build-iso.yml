name: Build OmniLinux ISO

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends live-build debootstrap squashfs-tools xorriso mtools curl wget git

      - name: Build OmniLinux (amd64)
        run: |
          sudo chmod +x build.sh
          sudo ./build.sh amd64
        shell: bash
        timeout-minutes: 60

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-amd64-ISO
          path: OmniLinux-*.iso
          if-no-files-found: error
          retention-days: 7