name: Build OmniLinux ISO

on:
  # Allows you to trigger the build manually from the GitHub Actions tab
  workflow_dispatch: 
  # Automatically builds when you push to main/master (optional)
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-iso:
    runs-on: ubuntu-24.04 # We use an Ubuntu server provided by GitHub
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools xorriso mtools curl wget git

      - name: Build OmniLinux (amd64)
        run: |
          # Give execution permission and build the 64-bit ISO
          sudo chmod +x build.sh
          sudo ./build.sh amd64

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-amd64-ISO
          path: OmniLinux-*.iso
          if-no-files-found: error
          retention-days: 7
