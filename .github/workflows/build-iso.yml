name: Build OmniLinux ISO
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            mtools \
            git \
            wget \
            gzip
      
      - name: Clean
        run: |
          sudo rm -rf auto chroot .stage live-image-*.iso
        
      - name: Configure
        run: |
          sudo mkdir -p auto
          cat > auto/config <<'EOF'
#!/bin/bash
lb config noauto \
    --architectures amd64 \
    --mode debian \
    --distribution noble \
    --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
    --mirror-binary http://archive.ubuntu.com/ubuntu/ \
    --iso-application "OmniLinux" \
    --iso-publisher "OmniLinux" \
    --iso-volume "OmniLinux" \
    --bootappend-live "boot=live config" \
    --linux-packages "linux-image-generic" \
    --initramfs "initramfs-tools" \
    --system live \
    --source false \
    --binary-images iso-hybrid
EOF
          chmod +x auto/config

      - name: Bootstrap
        run: |
          sudo lb bootstrap
        timeout-minutes: 20

      - name: Chroot
        run: |
          sudo lb chroot
        timeout-minutes: 20

      - name: Build
        run: |
          sudo lb build
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: live-image-*.iso
          if-no-files-found: error