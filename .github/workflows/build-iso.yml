name: Build OmniLinux ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools xorriso mtools git wget

      - name: Build ISO
        run: |
          sudo chmod +x build.sh
          sudo ./build.sh amd64

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: OmniLinux-*.iso
          if-no-files-found: error