name: Build OmniLinux ISO

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build
          lb --version
          which lb
          dpkg -l | grep live-build
          
      - name: Check config
        run: |
          cat auto/config
          ls -la auto/
          ls -la config/

      - name: Try bootstrap manually
        working-directory: /home/runner/work/OmniLinux/OmniLinux
        run: |
          sudo rm -rf auto chroot .stage 
          sudo lb config --help 2>&1 | head -50
          
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: debug
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            mtools \
            git \
            wget \
            gzip
      
      - name: Clean
        run: |
          sudo rm -rf auto chroot .stage live-image-*.iso
        
      - name: Configure
        run: |
          cd /home/runner/work/OmniLinux/OmniLinux
          sudo mkdir -p auto
          cat > auto/config <<'EOF'
#!/bin/bash
lb config noauto \
    --architectures amd64 \
    --mode debian \
    --distribution noble \
    --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
    --mirror-binary http://archive.ubuntu.com/ubuntu/ \
    --iso-application "OmniLinux" \
    --iso-publisher "OmniLinux" \
    --iso-volume "OmniLinux" \
    --bootappend-live "boot=live config" \
    --linux-packages "linux-image-generic" \
    --initramfs "initramfs-tools" \
    --system live \
    --source false \
    --binary-images iso-hybrid
EOF
          chmod +x auto/config

      - name: Bootstrap
        working-directory: /home/runner/work/OmniLinux/OmniLinux
        run: |
          sudo lb bootstrap
        timeout-minutes: 20

      - name: Chroot
        working-directory: /home/runner/work/OmniLinux/OmniLinux
        run: |
          sudo lb chroot
        timeout-minutes: 20

      - name: Build
        working-directory: /home/runner/work/OmniLinux/OmniLinux
        run: |
          sudo lb build
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: live-image-*.iso
          if-no-files-found: error