name: ISO
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y live-build debootstrap squashfs-tools xorriso
      - name: clean
        run: sudo rm -rf auto chroot live-image-*.iso
      - name: config
        run: |
          sudo mkdir -p auto
          echo '#!/bin/bash' > config.sh
          echo 'lb config noauto --mode debian --distribution noble --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ --mirror-binary http://archive.ubuntu.com/ubuntu/ --binary-images iso-hybrid --system live' >> config.sh
          chmod +x config.sh
          sudo bash config.sh
      - name: bootstrap
        run: sudo lb bootstrap
      - name: chroot
        run: sudo lb chroot
      - name: build
        run: sudo lb build
      - uses: actions/upload-artifact@v4
        with:
          name: OmniLinux-ISO
          path: live-image-*.iso