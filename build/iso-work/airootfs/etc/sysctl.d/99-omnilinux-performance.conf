# ============================================================
# OmniLinux Kernel Parameters — Maximum Performance
# /etc/sysctl.d/99-omnilinux-performance.conf
# ============================================================

# ──────────────────────────────────────────────────────────────
# Virtual Memory — Optimized for responsiveness
# ──────────────────────────────────────────────────────────────
# Lower swappiness = prefer RAM over swap
vm.swappiness = 10

# Reduce tendency to reclaim VFS cache
vm.vfs_cache_pressure = 50

# Dirty page writeback tuning
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5
vm.dirty_writeback_centisecs = 1500
vm.dirty_expire_centisecs = 3000

# Overcommit memory (useful for gaming & heavy workloads)
vm.overcommit_memory = 1

# Max memory map areas (helps with gaming/Wine)
vm.max_map_count = 2147483642

# ──────────────────────────────────────────────────────────────
# Network — Maximum Throughput with BBR
# ──────────────────────────────────────────────────────────────
# BBR congestion control
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TCP Fast Open (client + server)
net.ipv4.tcp_fastopen = 3

# Increase buffer sizes
net.core.rmem_default = 1048576
net.core.rmem_max = 16777216
net.core.wmem_default = 1048576
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Connection queue
net.core.somaxconn = 8192
net.core.netdev_max_backlog = 16384

# TCP keepalive (reduce stale connections)
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Enable SYN cookies (DDoS protection)
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 8192

# Reuse TIME_WAIT sockets
net.ipv4.tcp_tw_reuse = 1

# Disable IPv6 if not needed (optional, uncomment)
# net.ipv6.conf.all.disable_ipv6 = 1

# ──────────────────────────────────────────────────────────────
# Kernel — Security & Performance
# ──────────────────────────────────────────────────────────────
# Enable SysRq (useful for debugging)
kernel.sysrq = 1

# Shared memory max (for databases, VMs)
kernel.shmmax = 68719476736
kernel.shmall = 4294967296

# Increase inotify watches (for IDEs, file watchers)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# Increase file descriptors
fs.file-max = 2097152
fs.nr_open = 1048576

# Core dumps (disable for security, enable for debugging)
kernel.core_pattern = |/bin/false

# Restrict dmesg to root
kernel.dmesg_restrict = 1

# Restrict kernel pointer exposure
kernel.kptr_restrict = 2

# ──────────────────────────────────────────────────────────────
# Security Hardening
# ──────────────────────────────────────────────────────────────
# ASLR (Address Space Layout Randomization)
kernel.randomize_va_space = 2

# Restrict unprivileged user namespaces (security)
# kernel.unprivileged_userns_clone = 0

# Yama ptrace scope (prevent process spying)
kernel.yama.ptrace_scope = 1
